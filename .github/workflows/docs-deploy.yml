name: Deploy Docs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Where to publish'
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          startsWith(github.ref, 'refs/tags/v') &&
          !contains(github.ref_name, '-beta') &&
          !contains(github.ref_name, '-alpha') &&
          !contains(github.ref_name, '-rc')
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout electrobun
        uses: actions/checkout@v6

      - name: Resolve Cloudflare Pages branch
        id: deploy-branch
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          elif [[ "${DEPLOY_ENVIRONMENT}" == "production" ]]; then
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "branch=preview" >> $GITHUB_OUTPUT
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install docs dependencies
        run: bun install
        working-directory: docs

      - name: Build docs
        run: bun run build
        working-directory: docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=electrobun-docs --branch=${{ steps.deploy-branch.outputs.branch }}
