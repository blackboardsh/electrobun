name: Deploy Docs (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Pages branch to deploy to. Use "preview" for a *.pages.dev test URL, or "main" to deploy to docs.electrobunny.ai.'
        required: true
        default: 'preview'
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install docs dependencies
        run: bun install
        working-directory: docs

      - name: Build docs
        run: bun run build
        working-directory: docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/dist --project-name=electrobun-docs --branch=${{ inputs.branch }}
