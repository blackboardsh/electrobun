<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rust Flock WGPU</title>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<main class="app">
			<section class="stage">
				<header class="topbar">
					<div>
						<h1>Rust Flock WGPU</h1>
						<p id="status">Waiting for surface</p>
					</div>
					<div class="readout">
						<span>fps</span>
						<strong id="fps-stat">--</strong>
					</div>
				</header>
				<div class="surface-shell">
					<div class="hud">
						<strong id="agent-stat">--</strong>
						<span>agents</span>
					</div>
					<electrobun-wgpu id="flock-surface"></electrobun-wgpu>
				</div>
			</section>
			<aside class="controls">
				<label>
					<span>Agents</span>
					<input id="agents" type="range" min="400" max="5000" step="100" value="2600" />
				</label>
				<label>
					<span>Repel</span>
					<input id="repel" type="range" min="0" max="10" step="0.25" value="6.5" />
				</label>
				<label>
					<span>Speed</span>
					<input id="speed" type="range" min="40" max="260" step="5" value="145" />
				</label>
				<label>
					<span>Cohesion</span>
					<input id="cohesion" type="range" min="0" max="10" step="0.25" value="3.25" />
				</label>
				<label>
					<span>Separation</span>
					<input id="separation" type="range" min="0" max="10" step="0.25" value="5.5" />
				</label>
				<div class="stats">
					<div>
						<span>Surface</span>
						<strong id="surface-stat">--</strong>
					</div>
					<div>
						<span>GPU view</span>
						<strong id="view-stat">--</strong>
					</div>
					<div>
						<span>Cursor</span>
						<strong id="cursor-stat">--</strong>
					</div>
				</div>
			</aside>
		</main>
		<script type="module" src="./index.js"></script>
	</body>
</html>
