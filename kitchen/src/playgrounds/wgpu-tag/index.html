<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WGPU Tag Playground</title>
    <script src="views://playgrounds/wgpu-tag/index.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { margin: 0 0 10px 0; }
        h2 { margin: 20px 0 10px 0; font-size: 16px; color: #555; }
        .controls {
            margin: 10px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 14px;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
        }
        button:hover {
            background: #f0f0f0;
        }
        .stage {
            position: relative;
            width: 640px;
            height: 380px;
            padding: 12px;
            border-radius: 12px;
            background: linear-gradient(135deg, #111827, #0b1020 60%, #0f172a);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .overlay-badge {
            position: absolute;
            top: 18px;
            right: 18px;
            z-index: 10;
            background: rgba(255,255,255,0.9);
            color: #111;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }
        .mask-overlay {
            position: absolute;
            top: 24px;
            left: 24px;
            width: 220px;
            height: 90px;
            background: rgba(250, 204, 21, 0.9);
            color: #111;
            font-weight: 700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(0,0,0,0.25);
            z-index: 12;
        }
        electrobun-wgpu {
            width: 600px;
            height: 350px;
            border: 2px solid #111;
            border-radius: 8px;
        }
        .status {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <button id="doneBtn" style="position: fixed; top: 10px; right: 10px; z-index: 9999; padding: 10px 24px; font-size: 14px; font-weight: 600; background: #4ade80; border: none; border-radius: 6px; color: #1a1a2e; cursor: pointer;">Done</button>

    <h1>WGPU Tag Playground</h1>
    <p>Test native WGPU surface positioning, transparency, passthrough, and resizing.</p>

    <h2>Controls</h2>
    <div class="controls">
        <button id="toggleShaderBtn">Toggle Shader</button>
        <button id="toggleTransparentBtn">Toggle Transparent</button>
        <button id="togglePassthroughBtn">Toggle Passthrough</button>
        <button id="toggleHiddenBtn">Toggle Hidden</button>
        <button id="addMaskBtn">Add Mask</button>
        <button id="removeMaskBtn">Remove Mask</button>
        <button id="resizeSmallBtn">Resize Small</button>
        <button id="resizeLargeBtn">Resize Large</button>
    </div>
    <div class="status" id="status">Status: waiting for WGPU view...</div>

    <h2>WGPU Surface</h2>
    <div class="stage">
        <div class="overlay-badge">HTML Overlay</div>
        <div class="mask-overlay mask-target">Menu Overlay (mask)</div>
        <electrobun-wgpu id="wgpuView"></electrobun-wgpu>
    </div>

</body>
</html>
